# AssetMint Sovereign Metadata Infrastructure
# All asset metadata is PRIVATE by default — stored on YOUR infrastructure.
# Endpoint: http://localhost:8900
#
# Usage: docker compose up -d

version: '3.8'

services:
  # Sovereign Metadata Service — replaces OriginTrail DKG Edge Node
  # Self-hosted, private-by-default, no external dependencies.
  # API: POST /publish, GET /get, GET /info, GET /health, GET /assets
  sovereign-metadata:
    build:
      context: ./sovereign-metadata
      dockerfile: Dockerfile
    ports:
      - "8900:8900"
    environment:
      - PORT=8900
      - DB_FILE=/data/metadata.json
    volumes:
      - metadata_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8900/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Supporting services (for future graph/search capabilities)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  blazegraph:
    image: nawer/blazegraph:2.1.5
    ports:
      - "9999:9999"
    volumes:
      - blazegraph_data:/var/lib/blazegraph

volumes:
  metadata_data:
  redis_data:
  blazegraph_data:
