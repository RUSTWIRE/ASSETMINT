#
# AssetMint TLS Reverse Proxy
# Terminates HTTPS and forwards to backend services.
#
# Usage:
#   1. Generate self-signed cert for testing:
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/nginx/ssl/assetmint.key \
#        -out /etc/nginx/ssl/assetmint.crt \
#        -subj "/CN=localhost"
#
#   2. For production: use Let's Encrypt or your CA
#
#   3. docker compose -f docker-compose.tls.yml up -d

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting zone (backup — API has its own rate limiter)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Compliance API (port 3001)
    upstream compliance_api {
        server 127.0.0.1:3001;
    }

    # Sovereign Metadata (port 8900)
    upstream metadata_api {
        server 127.0.0.1:8900;
    }

    # Frontend (port 3000)
    upstream frontend {
        server 127.0.0.1:3000;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/assetmint.crt;
        ssl_certificate_key /etc/nginx/ssl/assetmint.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compliance API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://compliance_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 1m;
        }

        # Sovereign Metadata
        location /metadata/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/metadata/(.*) /$1 break;
            proxy_pass http://metadata_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 1m;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}
